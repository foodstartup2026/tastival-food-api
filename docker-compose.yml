version: '3.9'

services:
  api:
    build: .
    ports:
      - '5000:80'
    environment:
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=tastival_food;Username=postgres;Password=postgres
      - JwtSettings__Secret=ReplaceWithSecureSecretKeyForJwtTokenGeneration12345
      - JwtSettings__Issuer=TastivalFoodApi
      - JwtSettings__Audience=TastivalFoodApiClients
      - Redis__Configuration=redis:6379
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tastival_food
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
